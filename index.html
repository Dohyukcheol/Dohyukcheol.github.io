<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeong Yoon-seo | Portfolio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #121212; color: #e0e0e0; font-family: 'Helvetica Neue', sans-serif; display: flex; min-height: 100vh; }
        
        /* 사이드바 메뉴 */
        sidebar { width: 280px; padding: 60px 40px; position: fixed; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid #222; }
        .logo h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; color: #fff; }
        .logo p { font-size: 11px; color: #888; margin-top: 5px; text-transform: uppercase; }
        nav { margin-top: 50px; }
        nav ul { list-style: none; }
        nav ul li { margin-bottom: 20px; }
        nav ul li a { color: #888; text-decoration: none; font-size: 14px; transition: color 0.3s; }
        nav ul li a:hover, nav ul li a.active { color: #fff; font-weight: 500; }
        .footer { font-size: 11px; color: #444; }

        /* 메인 콘텐츠 영역 (갤러리) */
        main { margin-left: 280px; padding: 60px; width: calc(100% - 280px); }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .grid-item { background: #1a1a1a; overflow: hidden; border-radius: 4px; position: relative; aspect-ratio: 3 / 2; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .grid-item:hover img, .grid-item:hover video { transform: scale(1.03); }
        
        /* 캡션 효과 */
        .item-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); opacity: 0; transition: opacity 0.3s ease; }
        .grid-item:hover .item-info { opacity: 1; }
        .item-info h3 { font-size: 15px; color: #fff; font-weight: 500; }
        .item-info p { font-size: 12px; color: #ccc; margin-top: 4px; }

        /* 반응형 모바일 레이아웃 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            sidebar { width: 100%; height: auto; position: relative; padding: 30px; border-right: none; border-bottom: 1px solid #222; }
            main { margin-left: 0; width: 100%; padding: 30px; }
            .gallery { grid-template-columns: 1fr; gap: 20px; }
        }
    </style>
</head>
<body>

    <sidebar>
        <div class="top-nav">
            <div class="logo">
                <h1>JEONG YOON-SEO</h1>
                <p>Visual Archive</p>
            </div>
            <nav>
                <ul>
                    <li><a href="#" class="active">All Work</a></li>
                    <li><a href="#">Photography</a></li>
                    <li><a href="#">Video</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </nav>
        </div>
        <div class="footer">
            <p>&copy; 2026 Jeong Yoon-seo.</p>
        </div>
    </sidebar>

    <main>
        <div class="gallery">
            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=800&q=80" alt="Work 1">
                <div class="item-info">
                    <h3>Project Title 01</h3>
                    <p>Photography / 35mm Film</p>
                </div>
            </div>

            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&w=800&q=80" alt="Work 2">
                <div class="item-info">
                    <h3>Project Title 02</h3>
                    <p>Commercial Product Shot</p>
                </div>
            </div>

            <div class="grid-item">
                <video src="https://assets.mixkit.co/videos/preview/mixkit-cinematic-view-of-mountains-and-a-river-42319-large.mp4" muted autoplay loop></video>
                <div class="item-info">
                    <h3>Cinematic Showreel</h3>
                    <p>Video Production / Directing</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
